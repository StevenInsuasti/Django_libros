{% extends 'gestion/base.html' %}
{% block titulo %}Eliminar Libro{% endblock %}
{% block contenido %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card border-danger">
            <div class="card-header bg-danger text-white"><h4>Confirmar eliminación</h4></div>
            <div class="card-body">
                <p>¿Estás seguro de que deseas eliminar el libro <strong>{{ libro.titulo }}</strong>?</p>
                <p class="text-muted small">Autor: {{ libro.autor }} — ISBN: {{ libro.isbn }}</p>
                <form method="post">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-danger">Sí, eliminar</button>
                    <a href="{% url 'lista_libros' %}" class="btn btn-secondary">Cancelar</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
