<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block titulo %}Admin Libros{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
        <div class="container">
            <a class="navbar-brand" href="{% url 'lista_autores' %}">📚 Admin Libros</a>
            <div class="navbar-nav">
                <a class="nav-link text-white" href="{% url 'lista_autores' %}">Autores (func)</a>
                <a class="nav-link text-white" href="{% url 'autor_list_generica' %}">Autores (genérica)</a>
                <a class="nav-link text-white" href="{% url 'lista_libros' %}">Libros (func)</a>
                <a class="nav-link text-white" href="{% url 'libro_list_generica' %}">Libros (genérica)</a>
            </div>
        </div>
    </nav>
    <div class="container">
        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-info">{{ message }}</div>
            {% endfor %}
        {% endif %}
        {% block contenido %}{% endblock %}
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
